<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta | STYLE MATTELSA K</title>

    <link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<!-- =========================
     ENCABEZADO
========================= -->

<header class="navbar">

    <h1 class="logo">
        STYLE MATTELSA K
    </h1>

    <nav>

        <a href="index.html">Inicio</a>
        <a href="hombre.html">Hombre</a>
        <a href="mujer.html">Mujer</a>
        <a href="colecciones.html">Colecciones</a>
        <a href="promociones.html">Promociones</a>

    </nav>

</header>

<!-- =========================
     REGISTRO
========================= -->

<section class="login">

    <div class="login-imagen">

        <img src="img/login.jpg" alt="STYLE MATTELSA K">

    </div>

    <div class="login-formulario">

        <h2>Crear cuenta</h2>

        <p class="subtitulo">
            Regístrate para comenzar a comprar en STYLE MATTELSA K.
        </p>

        <form id="registroForm">

            <div class="campo">

                <label>Nombre completo</label>

                <input
                    type="text"
                    id="nombre"
                    placeholder="Escribe tu nombre">

            </div>

            <div class="campo">

                <label>Correo electrónico</label>

                <input
                    type="email"
                    id="correoRegistro"
                    placeholder="Escribe tu correo">

            </div>

            <div class="campo">

                <label>Contraseña</label>

                <input
                    type="password"
                    id="passwordRegistro"
                    placeholder="Crea una contraseña">

            </div>

            <div class="campo">

                <label>Confirmar contraseña</label>

                <input
                    type="password"
                    id="confirmarPassword"
                    placeholder="Confirma tu contraseña">

            </div>

           <button type="button" onclick="registrarUsuario()">
    Crear cuenta
</button>

        </form>

        <p class="registro">

            ¿Ya tienes una cuenta?

            <a href="login.html">

                Inicia sesión

            </a>

        </p>

    </div>

</section>

<script src="js/script.js"></script>

</body>

</html>
