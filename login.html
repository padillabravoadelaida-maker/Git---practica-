<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Iniciar sesión | STYLE MATTELSA K</title>

    <link rel="stylesheet"
          href="css/estilos.css">

</head>

<body>

<!-- =========================
     ENCABEZADO DE LA PÁGINA
========================= -->

<header class="navbar">

    <h1 class="logo">

        STYLE MATTELSA K

    </h1>

    <nav>

        <a href="index.html">Inicio</a>

        <a href="hombre.html">Hombre</a>

        <a href="mujer.html">Mujer</a>

        <a href="colecciones.html">Colecciones</a>

        <a href="promociones.html">Promociones</a>

    </nav>

</header>
<!-- =========================
     CONTENEDOR DEL LOGIN
========================= -->

<section class="login">

    <div class="login-container">

        <!-- IMAGEN -->

        <div class="login-imagen">

            <img src="img/login.jpg" alt="Modelo STYLE MATTELSA K">

        </div>

        <!-- FORMULARIO -->

        <div class="login-formulario">

            <h2>Bienvenida 👋</h2>

            <p class="subtitulo">
                Inicia sesión para continuar comprando en STYLE MATTELSA K.
            </p>

            <form id="loginForm">

                <div class="campo">

                    <label for="correo">
                        Correo electrónico
                    </label>

                    <input
                        type="email"
                        id="correo"
                        placeholder="Ingresa tu correo">

                </div>

                <div class="campo">

                    <label for="password">
                        Contraseña
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Ingresa tu contraseña">

                </div>

               <button type="button" onclick="iniciarSesion()">
    Iniciar sesión
</button>

            </form>

            <p class="registro">

                ¿No tienes una cuenta?

                <a href="registro.html">
                    Crear cuenta
                </a>

            </p>

        </div>

    </div>

</section>
<script src="js/script.js"></script>

</body>
</html>
